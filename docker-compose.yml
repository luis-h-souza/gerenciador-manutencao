version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: sgm_postgres
    environment:
      POSTGRES_DB: sgm_db
      POSTGRES_USER: manutencao_server
      POSTGRES_PASSWORD: manutencao_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sgm_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
